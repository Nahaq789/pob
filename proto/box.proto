syntax = "proto3";

package box;

option go_package = "pob/box/proto";

service BoxService {
  rpc GetParty(GetPartyRequest) returns (PartyResponse);
}

message GetPartyRequest {
  string party_id = 1;
  string user_id  = 2;
}

message PartyResponse {
  repeated PartyPokemon pokemon = 1;
}

message PartyPokemon {
  string box_pokemon_id = 1;
  int32  slot           = 2;
  int32  pokemon_id     = 3;
  string nickname       = 4; // 空文字はニックネームなし
  int32  ability_id     = 5;
  string nature         = 6; // e.g. "timid"
  int32  held_item_id   = 7; // 0: 道具なし

  // 技スロット（0: 未設定）
  int32 move1_id = 8;
  int32 move2_id = 9;
  int32 move3_id = 10;
  int32 move4_id = 11;

  // 個体値
  int32 iv_hp         = 12;
  int32 iv_attack     = 13;
  int32 iv_defense    = 14;
  int32 iv_sp_attack  = 15;
  int32 iv_sp_defense = 16;
  int32 iv_speed      = 17;

  // 努力値
  int32 ev_hp         = 18;
  int32 ev_attack     = 19;
  int32 ev_defense    = 20;
  int32 ev_sp_attack  = 21;
  int32 ev_sp_defense = 22;
  int32 ev_speed      = 23;
}
