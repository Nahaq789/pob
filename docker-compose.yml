services:
  # ── Go Services ─────────────────────────────────────────────
  dex:
    build:
      context: .
      dockerfile: dex/Dockerfile
    ports:
      - "9091:9091"
    depends_on:
      dex-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user:
    build:
      context: .
      dockerfile: user/Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ./user/pem/:/pem/
    depends_on:
      user-postgres:
        condition: service_healthy

  box:
    build:
      context: .
      dockerfile: box/Dockerfile
    ports:
      - "8083:8083"
      - "9093:9093"
    volumes:
      - ./box/pem/:/pem/
    depends_on:
      box-postgres:
        condition: service_healthy
      dex:
        condition: service_started

  battle:
    build:
      context: .
      dockerfile: battle/Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy
      dex:
        condition: service_started
      box:
        condition: service_started

  # ── Batch ────────────────────────────────────────────────────
  sync:
    build:
      context: .
      dockerfile: sync/Dockerfile
    depends_on:
      dex-postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools

  # ── Infrastructure ───────────────────────────────────────────
  user-postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/user-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pob -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  dex-postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/dex-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - dex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pob -d dex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  box-postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    volumes:
      - ./scripts/box-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - box_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pob -d box_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  user_postgres_data:
  dex_postgres_data:
  box_postgres_data:
  redis_data:
